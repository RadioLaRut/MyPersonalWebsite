<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>The Archive - Silent Editorial</title>
<!-- Fonts -->
<link href="https://fonts.googleapis.com" rel="preconnect"/>
<link crossorigin="" href="https://fonts.gstatic.com" rel="preconnect"/>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400&amp;family=Noto+Serif+SC:wght@300;400;500;700&amp;family=Switzer:wght@300;400;500;600&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<!-- Tailwind CSS -->
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<!-- Theme Configuration -->
<script>
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#FFFFFF",
                        "background-dark": "#000000",
                        "surface": "#0F0F0F",
                        "text-dim": "#A1A1AA",
                        "text-muted": "#3F3F46",
                        "accent": "#E11D48",
                    },
                    fontFamily: {
                        "display": ["Noto Serif SC", "serif"],
                        "body": ["Switzer", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"],
                    },
                    cursor: {
                        'none': 'none',
                    }
                },
            },
        }
    </script>
<style>        body {
            background-color: #000000;
            color: #ffffff;
            overflow-x: hidden;
            cursor: none;
        }

        ::-webkit-scrollbar {
            width: 4px;
        }
        ::-webkit-scrollbar-track {
            background: #000000;
        }
        ::-webkit-scrollbar-thumb {
            background: #333;
        }

        /* Updated Typography Style */
        .project-title {
            -webkit-text-stroke: 1px #555;
            color: transparent;
            font-weight: 300;
            transition: color 0.5s ease, -webkit-text-stroke 0.5s ease;
            z-index: 20;
            position: relative;
        }

        .project-item:hover .project-title {
            -webkit-text-stroke: 1px transparent;
            color: #ffffff;
        }

        /* Accordion Logic */
        .image-reveal-container {
            height: 0;
            width: 100%;
            max-width: 100%;
            aspect-ratio: 16 / 9;
            overflow: hidden;
            transition: height 0.7s cubic-bezier(0.16, 1, 0.3, 1), opacity 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            z-index: 10;
            opacity: 0;
        }

        .project-item:hover .image-reveal-container {
            height: 100%;
            opacity: 1;
        }

        .project-item {
            transition: height 0.7s cubic-bezier(0.16, 1, 0.3, 1);
            height: 15vh;
            display: flex;
            align-items: center;
            justify-content: flex-end;
            padding-right: 2rem;
        }

        .project-item:hover {
            height: 60vh;
        }

        #cursor {
            pointer-events: none;
            position: fixed;
            z-index: 9999;
            width: 40px;
            height: 40px;
            border: 1px solid white;
            border-radius: 50%;
            background-color: white;
            mix-blend-mode: difference;
            transform: translate(-50%, -50%);
            transition: width 0.3s, height 0.3s, background-color 0.3s;
        }
        
        .animate-reveal {
            animation: fadeIn 1.2s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .year-label {
            font-family: 'JetBrains Mono', monospace;
            font-size: 0.75rem;
            opacity: 0.5;
            margin-left: 1.5rem;
            margin-top: 2rem;
            vertical-align: top;
        }</style>
</head>
<body class="bg-background-dark font-body antialiased selection:bg-white selection:text-black">
<!-- Custom Cursor -->
<div class="hidden md:block" id="cursor"></div>
<!-- Background Grid/Texture (Subtle) -->
<!-- Main Navigation / Header (Minimal) -->
<nav class="fixed top-0 left-0 w-full z-50 px-8 py-6 mix-blend-difference flex justify-between items-start pointer-events-none">
<div class="flex flex-col gap-1 pointer-events-auto">
<!-- Breadcrumb / Location -->
<div class="flex items-center gap-2">
<span class="w-2 h-2 bg-white rounded-full block animate-pulse"></span>
<span class="font-mono text-[10px] tracking-widest text-white/80 uppercase">ALL THE WORKS</span>
</div>
</div>
<!-- Menu Button -->
<button class="group pointer-events-auto flex flex-col items-end gap-1.5" id="menu-toggle">
<span class="w-8 h-[1px] bg-white group-hover:w-12 transition-all duration-300"></span>
<span class="w-5 h-[1px] bg-white group-hover:w-12 transition-all duration-300 delay-75"></span>
</button>
</nav>
<!-- Main Layout Container -->
<main class="relative min-h-screen w-full flex flex-col md:flex-row">
<section class="w-full min-h-screen flex flex-col pt-32 pb-64 px-8 md:px-24 relative z-20">
<div class="flex flex-col">
<!-- Project 01 -->
<div class="project-item group relative border-b border-white/10">
<div class="image-reveal-container pointer-events-none">
<img class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000" src="https://placeholder.pics/svg/300"/>
</div>
<div class="flex items-start z-20">
<h2 class="project-title font-display text-6xl md:text-8xl lg:text-[120px] pointer-events-none">INSIGHT</h2>
<span class="year-label">2024</span>
</div>
</div>
<!-- Project 02 -->
<div class="project-item group relative border-b border-white/10">
<div class="image-reveal-container pointer-events-none">
<img class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000" src="https://placeholder.pics/svg/300"/>
</div>
<div class="flex items-start z-20">
<h2 class="project-title font-display text-6xl md:text-8xl lg:text-[120px] pointer-events-none">PENGUIN TRADING</h2>
<span class="year-label">2024</span>
</div>
</div>
<!-- Project 03 -->
<div class="project-item group relative border-b border-white/10">
<div class="image-reveal-container pointer-events-none">
<img class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000" src="https://placeholder.pics/svg/300"/>
</div>
<div class="flex items-start z-20">
<h2 class="project-title font-display text-6xl md:text-8xl lg:text-[120px] pointer-events-none">SLAY THE VIRUS</h2>
<span class="year-label">2023</span>
</div>
</div>
<!-- Project 04 -->
<div class="project-item group relative border-b border-white/10">
<div class="image-reveal-container pointer-events-none">
<img class="w-full h-full object-cover grayscale hover:grayscale-0 transition-all duration-1000" src="https://placeholder.pics/svg/300"/>
</div>
<div class="flex items-start z-20">
<h2 class="project-title font-display text-6xl md:text-8xl lg:text-[120px] pointer-events-none">PROMETHEUS</h2>
<span class="year-label">2022</span>
</div>
</div>
</div>
</section>
</main>
<!-- Custom Javascript for Cursor Logic only -->
<script>
        const cursor = document.getElementById('cursor');

        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });

        // Add blend mode changes on link hover
        const links = document.querySelectorAll('a, button');
        links.forEach(link => {
            link.addEventListener('mouseenter', () => {
                cursor.style.width = '80px';
                cursor.style.height = '80px';
                cursor.style.mixBlendMode = 'difference';
            });
            link.addEventListener('mouseleave', () => {
                cursor.style.width = '40px';
                cursor.style.height = '40px';
                cursor.style.mixBlendMode = 'difference';
            });
        });
    </script>
<div class="fixed inset-0 bg-black z-[100] flex flex-col items-center justify-center transition-opacity duration-500 opacity-0 pointer-events-none" id="menu-overlay">
<button class="fixed top-6 right-8 group flex flex-col items-end gap-1.5 pointer-events-auto" id="close-menu">
<span class="w-8 h-[1px] bg-white rotate-45 translate-y-[4px] transition-all duration-300"></span>
<span class="w-8 h-[1px] bg-white -rotate-45 -translate-y-[4px] transition-all duration-300"></span>
</button>
<nav class="flex flex-col gap-8 text-center">
<a class="font-display text-6xl md:text-8xl text-white hover:text-white/50 transition-colors duration-300" href="#">首页 (HOME)</a>
<a class="font-display text-6xl md:text-8xl text-white hover:text-white/50 transition-colors duration-300" href="#">所有作品 (WORKS)</a>
<a class="font-display text-6xl md:text-8xl text-white hover:text-white/50 transition-colors duration-300" href="#">关于我 (ABOUT)</a>
</nav>
</div><script>
    const menuToggle = document.getElementById('menu-toggle');
    const menuOverlay = document.getElementById('menu-overlay');
    const closeMenu = document.getElementById('close-menu');

    menuToggle.addEventListener('click', () => {
        menuOverlay.classList.remove('opacity-0', 'pointer-events-none');
        menuOverlay.classList.add('opacity-100', 'pointer-events-auto');
    });

    closeMenu.addEventListener('click', () => {
        menuOverlay.classList.remove('opacity-100', 'pointer-events-auto');
        menuOverlay.classList.add('opacity-0', 'pointer-events-none');
    });

    // Close on link click
    menuOverlay.querySelectorAll('a').forEach(link => {
        link.addEventListener('click', () => {
            menuOverlay.classList.remove('opacity-100', 'pointer-events-auto');
            menuOverlay.classList.add('opacity-0', 'pointer-events-none');
        });
    });
</script></body></html>
